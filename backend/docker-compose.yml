version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocal-craft-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount audio files directory for persistence
      - ./audio_files:/app/audio_files
      - ./request_files:/app/request_files
      # Mount .env file
      - ./.env:/app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  audio_files:
